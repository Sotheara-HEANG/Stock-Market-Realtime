services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: econ_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       econ_pipeline
      POSTGRES_USER:     ${DB_USER:-Chungheang}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./03_warehouse/bronze/schema.sql:/docker-entrypoint-initdb.d/01_bronze.sql
      - ./03_warehouse/silver/schema.sql:/docker-entrypoint-initdb.d/02_silver.sql
      - ./03_warehouse/gold/schema.sql:/docker-entrypoint-initdb.d/03_gold.sql
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-Chungheang} -d econ_pipeline"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MLflow Tracking Server ────────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: econ_mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_ALLOW_ORIGINS: "*"
    command: >
      bash -c "pip install mlflow psycopg2-binary --quiet &&
               mlflow server --backend-store-uri postgresql+psycopg2://${DB_USER:-Chungheang}:${DB_PASSWORD:-}@postgres:5432/econ_pipeline --default-artifact-root /mlflow-artifacts --host 0.0.0.0 --port 5001 --allowed-hosts '*'"
    volumes:
      - mlflow_artifacts:/mlflow-artifacts
    ports:
      - "5001:5001"

  # ── ETL Pipeline (one-shot) ───────────────────────────────────────────────
  pipeline:
    build: .
    container_name: econ_pipeline
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    environment:
      DB_HOST:                 postgres
      DB_PORT:                 5432
      DB_NAME:                 econ_pipeline
      DB_USER:                 ${DB_USER:-Chungheang}
      DB_PASSWORD:             ${DB_PASSWORD:-}
      JAVA_HOME:               ${CONTAINER_JAVA_HOME:-/usr/lib/jvm/default-java}
      FINNHUB_API_KEY:         ${FINNHUB_API_KEY:-}
      FINNHUB_SYMBOLS:         ${FINNHUB_SYMBOLS:-AAPL,MSFT,NVDA,AMZN,GOOGL,META,TSLA,JPM,BAC,V,JNJ,UNH,XOM}
      FINNHUB_HISTORY_YEARS:   ${FINNHUB_HISTORY_YEARS:-5}
      MLFLOW_TRACKING_URI:     http://mlflow:5001
    volumes:
      - .:/app
    profiles: ["run"]

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build: .
    container_name: econ_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn 05_app.api.app:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     econ_pipeline
      DB_USER:     ${DB_USER:-Chungheang}
      DB_PASSWORD: ${DB_PASSWORD:-}
      JAVA_HOME:   ${CONTAINER_JAVA_HOME:-/usr/lib/jvm/default-java}
      FINNHUB_API_KEY:         ${FINNHUB_API_KEY:-}
      FINNHUB_SYMBOLS:         ${FINNHUB_SYMBOLS:-AAPL,MSFT,NVDA,AMZN,GOOGL,META,TSLA,JPM,BAC,V,JNJ,UNH,XOM}
      FINNHUB_HISTORY_YEARS:   ${FINNHUB_HISTORY_YEARS:-5}
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    profiles: ["app"]

  # ── Streamlit Dashboard ───────────────────────────────────────────────────
  dashboard:
    build: .
    container_name: econ_dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: streamlit run 05_app/dashboard/dashboard.py --server.port 8501 --server.address 0.0.0.0
    environment:
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     econ_pipeline
      DB_USER:     ${DB_USER:-Chungheang}
      DB_PASSWORD: ${DB_PASSWORD:-}
      JAVA_HOME:   ${CONTAINER_JAVA_HOME:-/usr/lib/jvm/default-java}
      FINNHUB_API_KEY:         ${FINNHUB_API_KEY:-}
      FINNHUB_SYMBOLS:         ${FINNHUB_SYMBOLS:-AAPL,MSFT,NVDA,AMZN,GOOGL,META,TSLA,JPM,BAC,V,JNJ,UNH,XOM}
      FINNHUB_HISTORY_YEARS:   ${FINNHUB_HISTORY_YEARS:-5}
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    profiles: ["app"]

volumes:
  postgres_data:
  mlflow_artifacts:
