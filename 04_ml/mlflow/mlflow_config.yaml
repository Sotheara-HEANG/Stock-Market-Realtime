mlflow:
  tracking_uri: "mlruns"            # local file-based tracking (no server needed)
  experiment_name: "finnhub-stock-forecasting"
  artifact_location: "mlartifacts/finnhub-stock-forecasting"

  default_tags:
    project: "finnhub-trading-pipeline"
    team: "data-engineering"

models:
  linear_trend:
    description: "OLS trend extrapolation with 95% prediction intervals"
    params:
      horizon: 3
      confidence_level: 0.95

  holt_smoothing:
    description: "Holt double exponential smoothing with damped trend"
    params:
      horizon: 3
      trend: "add"
      damped_trend: true
      optimized: true

indicators:
  - open_price
  - high_price
  - low_price
  - close_price
  - latest_price

training:
  min_observations: 3
  test_size: 1          # hold out last N points for evaluation
